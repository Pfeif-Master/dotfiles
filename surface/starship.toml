# ~/.config/starship.toml
# FoxDen prompt config

format = """
$python$username[の](white)$hostname$directory$git_branch$git_status
[猫](#FFB700 bold)"""

add_newline = false

# ── User ────────────────────────────────────────────────────────────────────
[username]
show_always = true
format = "[$user]($style)"
style_user = "bold #00FF9C"
style_root = "bold #FF4444"

# ── Hostname ─────────────────────────────────────────────────────────────────
[hostname]
ssh_only = false
disabled = false
format = "[$hostname⛩️  ]($style)"
style = "bold #00E5FF"

# ── Directory ────────────────────────────────────────────────────────────────
[directory]
format = "[$path]($style) "
style = "bold #FFB700"
truncation_length = 4
truncate_to_repo = true

# ── Git ──────────────────────────────────────────────────────────────────────
[git_branch]
format = "[$symbol$branch]($style) "
style = "bold #FF8C00"
symbol = "\uE0A0 "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "#FF4444"
conflicted  = "⚡${count}"
untracked   = "?${count}"
modified    = "!${count}"
staged      = "+${count}"
renamed     = "»${count}"
deleted     = "✘${count}"
stashed     = "≡"
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "#FF4444"

# ── Disable noisy auto-detection modules ────────────────────────────────────
# Uncomment any you actually use
[aws]
disabled = true

[docker_context]
disabled = true

[nodejs]
disabled = true

[python]
disabled = false
format = '[(\($virtualenv\) )]($style)'
style = "bold #98C379"

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[package]
disabled = true
