# packages.conf - FoxDen package groups
#
# Format:
#   [group-name]
#   description=Human readable label shown during install
#   packages=space separated apt package names
#   post_install=optional shell command(s) run after apt install
#
# Add new groups freely - install.sh reads this at runtime

[python-tools]
description=Python rich and common CLI utilities
packages=python3-pip python3-rich

[ycm-base]
description=YCM base build dependencies (cmake, python3-dev)
packages=build-essential cmake python3-dev python3-setuptools

[ycm-clang]
description=YCM C/C++ completions via clangd
packages=clangd

[ycm-rust]
description=Rust toolchain + rust-analyzer for YCM Rust completions
packages=
post_install=curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && source "$HOME/.cargo/env" && rustup component add rust-analyzer

[uv]
description=uv - fast Python package and project manager
packages=
post_install=curl -LsSf https://astral.sh/uv/install.sh | sh

[bat]
description=bat - cat with syntax highlighting and line numbers
packages=bat
post_install=mkdir -p "$HOME/.local/bin" && (command -v batcat &>/dev/null && ln -sf "$(command -v batcat)" "$HOME/.local/bin/bat" || true)

[glow]
description=glow - terminal markdown renderer (via Charm apt repo, avoids snap .dir confinement)
packages=
post_install=curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg && echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list && sudo apt update && sudo apt install -y glow
