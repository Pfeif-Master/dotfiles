# packages.conf - FoxDen package groups
#
# Format:
#   [group-name]
#   description=Human readable label shown during install
#   packages=space separated apt package names
#   post_install=optional shell command(s) run after apt install
#
# Add new groups freely - install.sh reads this at runtime

[python-tools]
description=Python rich and common CLI utilities
packages=python3-pip python3-rich

[ycm-base]
description=YCM base build dependencies (cmake, python3-dev)
packages=build-essential cmake python3-dev python3-setuptools

[ycm-clang]
description=YCM C/C++ completions via clangd
packages=clangd

[ycm-rust]
description=Rust toolchain + rust-analyzer for YCM Rust completions
packages=
post_install=curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && source "$HOME/.cargo/env" && rustup component add rust-analyzer
